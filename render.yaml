services:
  # Single web service: Express serves both the API and the React frontend.
  # No CORS issues, no VITE_API_URL needed — everything is same-origin.
  - type: web
    name: clarity-app
    env: node
    plan: free
    # 1. Build React frontend  2. Build Express backend
    # --include=dev ensures Vite (a devDependency) is installed even when NODE_ENV=production
    buildCommand: npm install --include=dev && npm run build && cd backend && npm install && npm run build
    # Run the compiled Express server
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true        # Render auto-generates a secure random value
      - key: DATABASE_URL
        sync: false                # Paste your Neon connection string in the dashboard
      - key: GROQ_API_KEY
        sync: false                # Paste your Groq API key in the dashboard
